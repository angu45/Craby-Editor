<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online C Compiler</title>
    <meta name="description" content="Free Online C Compiler - Write, compile and run C programs directly in your browser with a modern VS Code-style editor.">
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script async src="https://cdn.jsdelivr.net/npm/@jspawn/jspawn@0.5.2/dist/jspawn.umd.js"></script>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

    <link rel="stylesheet" href="css/compiler.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['JetBrains Mono', 'monospace'],
                        sans: ['Outfit', 'sans-serif']
                    }
                }
            }
        }
    </script>
</head>

<body class="h-full font-sans" id="appBody">
    <div id="app" class="h-full flex flex-col overflow-hidden" style="background:#0d0d14;">
        <header id="headerBar" class="flex items-center justify-between px-4 py-2 border-b border-white/5 flex-shrink-0" style="background:rgba(13,13,20,0.98);">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="p-1.5 rounded-lg hover:bg-white/5 transition-colors lg:hidden" aria-label="Toggle sidebar">
                    <i data-lucide="panel-left" class="w-5 h-5 text-gray-400"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm logo-gradient">C</div>
                    <span id="appTitleEl" class="font-semibold text-white text-sm hidden sm:inline">Craby C Compiler</span>
                </div>
            </div>
            <div class="flex items-center gap-1.5 sm:gap-2">
                <button id="btnRun" class="btn-glow flex items-center gap-1.5 px-3 py-1.5 rounded-lg font-semibold text-xs sm:text-sm transition-all" style="background:#c8ff00;color:#0d0d14;">
                    <i data-lucide="play" class="w-3.5 h-3.5"></i> <span id="runBtnText">Run Code</span>
                </button>
                <button id="btnFormat" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 text-xs sm:text-sm transition-colors" title="Format Code">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">Format</span>
                </button>
                <button id="btnDownload" class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 text-xs sm:text-sm transition-colors" title="Download File">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">Download</span>
                </button>
                <button id="btnSettings" class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-white/5 transition-colors" title="Settings">
                    <i data-lucide="settings" class="w-4 h-4"></i>
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <aside id="sidebar" class="hidden lg:flex flex-col flex-shrink-0 border-r border-white/5 panel-glass slide-left" style="width:220px;">
                <div class="flex items-center justify-between p-3 border-b border-white/5">
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Explorer</span>
                    <button id="btnNewFile" class="p-1 rounded hover:bg-white/10 text-gray-400 hover:text-white transition-colors" title="New File">
                        <i data-lucide="file-plus" class="w-4 h-4"></i>
                    </button>
                </div>
                <div id="fileList" class="flex-1 overflow-y-auto p-1.5"></div>
            </aside>

            <div id="sidebarOverlay" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden" style="backdrop-filter:blur(4px);"></div>
            <aside id="sidebarMobile" class="hidden fixed left-0 top-0 bottom-0 z-50 flex-col panel-glass slide-left lg:hidden" style="width:260px;">
                <div class="flex items-center justify-between p-3 border-b border-white/5">
                    <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Explorer</span>
                    <div class="flex items-center gap-1">
                        <button id="btnNewFileMobile" class="p-1 rounded hover:bg-white/10 text-gray-400 hover:text-white transition-colors" title="New File">
                            <i data-lucide="file-plus" class="w-4 h-4"></i>
                        </button>
                        <button id="closeSidebar" class="p-1 rounded hover:bg-white/10 text-gray-400 hover:text-white transition-colors">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div id="fileListMobile" class="flex-1 overflow-y-auto p-1.5"></div>
            </aside>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div id="tabBar" class="flex items-center border-b border-white/5 overflow-x-auto flex-shrink-0" style="background:rgba(13,13,20,0.7);"></div>
                
                <div class="flex-1 flex overflow-hidden relative" id="editorWrapper">
                    <div id="lineNumbers" class="flex-shrink-0 text-right select-none pr-3 pl-3 pt-0 overflow-hidden font-mono text-xs line-numbers-style"></div>
                    <div class="flex-1 relative overflow-hidden">
                        <div id="highlightOverlay" class="highlight-overlay"></div>
                        <textarea id="codeInput" class="code-input" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Code editor"></textarea>
                    </div>
                </div>

                <div id="resizeHandle" class="resize-handle-style group">
                    <div class="w-8 h-0.5 rounded-full bg-white/10 group-hover:bg-white/30 transition-colors"></div>
                </div>

                <div id="outputPanel" class="flex-shrink-0 flex flex-col overflow-hidden output-panel-default">
                    <div class="flex items-center justify-between px-3 py-1.5 border-b border-white/5 flex-shrink-0">
                        <div class="flex items-center gap-2">
                            <i data-lucide="terminal" class="w-3.5 h-3.5 text-gray-500"></i>
                            <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Output</span>
                            <span id="outputStatus" class="text-xs text-gray-600"></span>
                        </div>
                        <button id="btnClearOutput" class="p-1 rounded hover:bg-white/10 text-gray-500 hover:text-white transition-colors" title="Clear">
                            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <div id="outputContent" class="output-content-style"></div>
                </div>
            </div>

            <div id="settingsOverlay" class="hidden fixed inset-0 bg-black/40 z-40" style="backdrop-filter:blur(4px);"></div>
            <aside id="settingsPanel" class="hidden fixed right-0 top-0 bottom-0 z-50 flex-col panel-glass slide-right overflow-y-auto" style="width:300px;max-width:85%;">
                <div class="flex items-center justify-between p-4 border-b border-white/5">
                    <span class="font-semibold text-white text-sm">Settings</span>
                    <button id="closeSettings" class="p-1 rounded hover:bg-white/10 text-gray-400 hover:text-white transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="p-4 space-y-5">
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Font Size</label>
                        <input type="range" id="settingFontSize" min="10" max="24" value="14" class="w-full accent-[#c8ff00]">
                        <div class="text-xs text-gray-500 mt-1"><span id="fontSizeVal">14</span>px</div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Font Family</label>
                        <select id="settingFontFamily" class="setting-input text-sm">
                            <option value="JetBrains Mono">JetBrains Mono</option>
                            <option value="Fira Code">Fira Code</option>
                            <option value="Source Code Pro">Source Code Pro</option>
                            <option value="Cascadia Code">Cascadia Code</option>
                            <option value="monospace">System Monospace</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-400 mb-1.5">Theme</label>
                        <div class="flex gap-2">
                            <button id="themeDark" class="flex-1 py-2 rounded-lg text-xs font-medium transition-all theme-btn-active">Dark</button>
                            <button id="themeLight" class="flex-1 py-2 rounded-lg text-xs font-medium text-gray-400 hover:text-white border border-white/10 transition-all">Light</button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-medium text-gray-400">Line Numbers</span>
                        <div id="toggleLineNums" class="toggle-track on"><div class="toggle-knob"></div></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-medium text-gray-400">Word Wrap</span>
                        <div id="toggleWordWrap" class="toggle-track"><div class="toggle-knob"></div></div>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-medium text-gray-400">Auto Save</span>
                        <div id="toggleAutoSave" class="toggle-track on"><div class="toggle-knob"></div></div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <div id="renameDialog" class="hidden fixed inset-0 z-50 flex items-center justify-center" style="background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);">
        <div class="panel-glass rounded-xl p-5 w-80 fade-up">
            <h3 class="text-sm font-semibold text-white mb-3">New File Name</h3>
            <input id="renameInput" class="setting-input text-sm mb-3" placeholder="filename.c">
            <div class="flex gap-2 justify-end">
                <button id="renameCancel" class="px-3 py-1.5 rounded-lg text-xs text-gray-400 hover:text-white hover:bg-white/5 transition-colors">Cancel</button>
                <button id="renameConfirm" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all" style="background:#c8ff00;color:#0d0d14;">Rename</button>
            </div>
        </div>
    </div>

    <script src="js/compiler.js"></script>
</body>
</html>
