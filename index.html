<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craby Editor | Anguworkshop</title>
    <meta name="description" content="Free online HTML, CSS, JS editor by Anguworkshop.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="dark">

<header>
    <div class="logo"><i class="fas fa-crab"></i><span>CRABY</span></div>
    <div class="nav-actions">
        <button class="icon-btn run-btn" onclick="runCode()"><i class="fas fa-play"></i></button>
        <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
    </div>
</header>

<div class="mobile-tabs">
    <button class="tab-btn active" onclick="switchTab('html')">HTML</button>
    <button class="tab-btn" onclick="switchTab('css')">CSS</button>
    <button class="tab-btn" onclick="switchTab('js')">JS</button>
    <button class="tab-btn preview-tab" onclick="switchTab('preview')">OUTPUT</button>
</div>

<div class="main-container">
    <div class="editor-section" id="editor-sec">
        <div class="editor-box" id="html-box">
            <div class="label">HTML</div>
            <textarea id="html-code" oninput="handleInput(this, 'html')" spellcheck="false"><h1>Hello World</h1></textarea>
        </div>
        <div class="editor-box" id="css-box">
            <div class="label">CSS</div>
            <textarea id="css-code" oninput="handleInput(this, 'css')" spellcheck="false">h1 { color: orange; text-align: center; }</textarea>
        </div>
        <div class="editor-box" id="js-box">
            <div class="label">JS</div>
            <textarea id="js-code" oninput="handleInput(this, 'js')" spellcheck="false">console.log('Ready');</textarea>
        </div>
    </div>

    <div class="preview-section" id="preview-sec">
        <iframe id="output"></iframe>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <h3>Settings</h3>
    <div class="s-group">
        <label>Theme</label>
        <select onchange="document.body.setAttribute('data-theme', this.value)">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
            <option value="cyber">Cyberpunk</option>
        </select>
    </div>
    <div class="s-group">
        <label>Font Size</label>
        <input type="number" id="font-size" value="14" onchange="updateFont()">
    </div>
    <button class="icon-btn" style="width:100%" onclick="toggleSettings()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
