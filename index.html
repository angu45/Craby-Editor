<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craby Editor - Smart Layout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">
        <span class="logo-text">Craby Editor</span>
    </div>
    <div class="header-actions">
        <button id="run-btn" class="icon-btn run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
        <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
    </div>
</header>

<div id="shutter-trigger" onclick="toggleShutter()">
    <i class="fas fa-chevron-right"></i>
</div>

<div class="main-container">
    <div id="editor-grid" class="editor-grid">
        </div>
</div>

<div id="shutter" class="shutter">
    <div class="shutter-header">
        <h3>TASKBAR</h3>
        <i class="fas fa-times" onclick="toggleShutter()"></i>
    </div>
    <button class="add-btn" onclick="addNewFilePrompt()"><i class="fas fa-plus"></i> NEW FILE</button>
    <div id="shutter-file-list" class="shutter-list"></div>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <span class="logo-text">LIVE PREVIEW</span>
        <button class="close-btn" onclick="closePreview()">CLOSE</button>
    </div>
    <div class="overlay-body">
        <iframe id="output-frame"></iframe>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
