<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦀 Craby Editor Ultra</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --accent: #ffb400; --text: #c9d1d9; --border: rgba(255, 255, 255, 0.1); --header: #010409;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER --- */
        header { 
            background: var(--header); padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--accent); z-index: 1000; 
        }
        .logo { font-weight: 800; font-size: 1.3rem; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .nav-actions { display: flex; gap: 8px; align-items: center; }

        .icon-btn { 
            background: var(--panel); border: 1px solid var(--border); color: var(--text); 
            padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; 
            display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); background: rgba(255,180,0,0.1); }
        .run-btn { background: var(--accent) !important; color: #000 !important; font-weight: bold; border: none; }

        /* --- MAIN LAYOUT --- */
        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        .editor-section { flex: 1; display: flex; flex-direction: column; border-right: 2px solid var(--border); }
        .editor-box { min-height: 50px; display: flex; flex-direction: column; border-bottom: 1px solid var(--border); position: relative; flex: 1; transition: 0.3s; }

        .label { background: rgba(0,0,0,0.3); padding: 5px 15px; font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 1px; display: flex; justify-content: space-between; }
        textarea { flex: 1; background: transparent; border: none; color: #9cdcfe; font-family: 'Fira Code', monospace; padding: 15px; resize: none; outline: none; font-size: 14px; line-height: 1.5; }

        /* --- SUGGESTION BOX --- */
        #suggestion-box {
            position: absolute; background: #1c2128 !important; border: 1px solid var(--accent);
            color: #ffffff !important; z-index: 9999; display: none; border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); min-width: 220px; max-height: 200px; overflow-y: auto;
        }
        .suggestion-item { padding: 10px 15px; cursor: pointer; font-family: 'Fira Code', monospace; font-size: 12px; border-bottom: 1px solid var(--border); color: #fff; background: #1c2128; display: flex; justify-content: space-between; }
        .suggestion-item:hover, .suggestion-item.active { background: var(--accent) !important; color: #000 !important; }

        /* --- PREVIEW --- */
        .preview-section { flex: 1; background: #cbd5e1; display: flex; align-items: center; justify-content: center; padding: 20px; position: relative;}
        .iframe-wrapper { width: 100%; height: 100%; background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.2); transition: 0.4s ease; border-radius: 4px; overflow: hidden;}
        .iframe-wrapper.mobile { width: 375px; height: 667px; border: 12px solid #222; border-radius: 30px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- ADVANCED SETTINGS PANEL --- */
        .settings-panel { position: absolute; right: -350px; top: 0; width: 320px; height: 100%; background: var(--panel); border-left: 2px solid var(--accent); z-index: 2000; padding: 25px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; color: white;}
        .settings-panel.open { right: 0; }
        .settings-panel h3 { margin-bottom: 20px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px;}
        .s-group { margin-bottom: 15px; }
        .s-group label { display: block; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
        .s-group select, .s-group input { width: 100%; padding: 8px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 4px; outline: none;}
        .checkbox-group { display: flex; align-items: center; gap: 10px; font-size: 13px; cursor: pointer; margin-bottom: 10px;}
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fas fa-crab"></i><span>CRABY ULTRA</span></div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="setDevice('desktop')"><i class="fas fa-desktop"></i></button>
        <button class="icon-btn" onclick="setDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
        <button class="icon-btn" onclick="beautifyCode()"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-sliders-h"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b>RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section">
        <div class="editor-box" id="html-box">
            <div class="label">HTML <i class="fas fa-code"></i></div>
            <textarea id="html-code" oninput="handleInput(this, 'html')" onkeydown="handleNav(event)" spellcheck="false"><h1>Hello!</h1></textarea>
        </div>
        <div class="editor-box" id="css-box">
            <div class="label">CSS <i class="fab fa-css3-alt"></i></div>
            <textarea id="css-code" oninput="handleInput(this, 'css')" onkeydown="handleNav(event)" spellcheck="false">h1 { color: #ffb400; text-align: center; }</textarea>
        </div>
        <div class="editor-box" id="js-box">
            <div class="label">JAVASCRIPT <i class="fab fa-js"></i></div>
            <textarea id="js-code" oninput="handleInput(this, 'js')" onkeydown="handleNav(event)" spellcheck="false">console.log('Craby Editor Loaded');</textarea>
        </div>
        <div id="suggestion-box"></div>
    </div>

    <div class="preview-section">
        <div id="wrapper" class="iframe-wrapper"><iframe id="output"></iframe></div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <h3>IDE Settings</h3>
        
        <div class="s-group">
            <label class="checkbox-group"><input type="checkbox" id="live-toggle" checked> Live Preview (Auto-run)</label>
        </div>

        <div class="s-group">
            <label>Font Size</label>
            <select id="font-size-sel" onchange="updateEditorStyles()">
                <option value="12px">12px</option>
                <option value="14px" selected>14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
            </select>
        </div>

        <div class="s-group">
            <label>Font Family</label>
            <select id="font-family-sel" onchange="updateEditorStyles()">
                <option value="'Fira Code', monospace">Fira Code</option>
                <option value="monospace">System Mono</option>
                <option value="'Courier New', Courier">Courier New</option>
            </select>
        </div>

        <div class="s-group">
            <label>Visible Editors</label>
            <label class="checkbox-group"><input type="checkbox" checked onchange="toggleBox('html-box', this.checked)"> Show HTML</label>
            <label class="checkbox-group"><input type="checkbox" checked onchange="toggleBox('css-box', this.checked)"> Show CSS</label>
            <label class="checkbox-group"><input type="checkbox" checked onchange="toggleBox('js-box', this.checked)"> Show JS</label>
        </div>

        <button class="icon-btn" style="width:100%; margin-top:20px; background: var(--accent); color: #000;" onclick="toggleSettings()"><b>Save & Close</b></button>
    </div>
</div>

<script>
    // --- EXTENDED LIBRARY ---
    const dict = {
        html: { 
            tags: ['div','span','h1','h2','h3','p','button','input','img','a','section','article','header','footer','nav','ul','li','ol','main','canvas','video','audio','iframe','form','label','select','textarea','table','tr','td','th'], 
            attrs: ['class','id','style','src','href','type','placeholder','onclick','value','name','required','data-','alt','target','rel','width','height'] 
        },
        css: { 
            props: ['background','background-color','color','margin','padding','display','flex','grid','border','width','height','font-size','font-family','position','top','left','right','bottom','opacity','transition','z-index','overflow','box-shadow','border-radius','justify-content','align-items','text-align'], 
            vals: ['block','none','flex','grid','inline-block','center','relative','absolute','fixed','pointer','transparent','white','black','red','blue','100%','100vh','0.5','inherit'] 
        },
        js: { 
            keys: ['function','const','let','var','console.log','document.getElementById','document.querySelector','addEventListener','window','setInterval','setTimeout','if','else','for','while','return','async','await','fetch','JSON.parse','JSON.stringify','Math.random','localStorage.setItem','localStorage.getItem'] 
        }
    };

    let selectedIdx = 0;
    const sBox = document.getElementById('suggestion-box');

    // --- CORE LOGIC ---
    function handleInput(el, lang) {
        const isLive = document.getElementById('live-toggle').checked;
        
        // Smart Punctuation
        el.addEventListener('input', (e) => {
            const pos = el.selectionStart;
            const val = el.value;
            if (e.data === '>') {
                const match = val.substring(0, pos).match(/<(\w+)[^>]*>$/);
                if (match && !['br','img','input','hr'].includes(match[1])) {
                    el.value = val.substring(0, pos) + `</${match[1]}>` + val.substring(pos);
                    el.selectionStart = el.selectionEnd = pos;
                }
            }
            if (e.data === '{') {
                el.value = val.substring(0, pos) + `}` + val.substring(pos);
                el.selectionStart = el.selectionEnd = pos;
            }
        }, {once: true});

        showSuggest(el, lang);
        if(isLive) runCode();
    }

    function showSuggest(el, lang) {
        const pos = el.selectionStart;
        const text = el.value.substring(0, pos);
        const lastWord = text.split(/[\s<>{}:;()]/).pop().toLowerCase();
        const line = text.split('\n').pop();

        let list = []; let type = '';
        if (lang === 'html') {
            if (line.match(/<(\w+)\s+[^>]*$/)) { list = dict.html.attrs; type = 'attr'; }
            else { list = dict.html.tags; type = 'tag'; }
        } else if (lang === 'css') {
            if (line.includes(':')) { list = dict.css.vals; type = 'val'; }
            else { list = dict.css.props; type = 'prop'; }
        } else { list = dict.js.keys; type = 'js'; }

        const matches = list.filter(m => m.startsWith(lastWord));

        if (matches.length > 0 && lastWord.length > 0) {
            sBox.innerHTML = matches.map((m, i) => `<div class="suggestion-item ${i===0?'active':''}" onclick="insert('${m}','${el.id}','${type}')"><span>${m}</span><small style="opacity:0.4">${type}</small></div>`).join('');
            sBox.style.display = 'block';
            sBox.style.top = (el.parentElement.offsetTop + 45) + 'px';
            sBox.style.left = '45px';
            selectedIdx = 0;
        } else { sBox.style.display = 'none'; }
    }

    function insert(val, id, type) {
        const el = document.getElementById(id);
        const pos = el.selectionStart;
        const text = el.value;
        const lastWordMatch = text.substring(0, pos).match(/[\w.-]+$/);
        const start = lastWordMatch ? pos - lastWordMatch[0].length : pos;

        let suffix = ""; let move = 0;
        if (type === 'attr') { suffix = '=""'; move = 1; }
        else if (type === 'prop') { suffix = ': ;'; move = 1; }
        else if (val === 'function') { suffix = ' () {}'; move = 4; }
        else if (val.includes('log') || val.includes('Get')) { suffix = '()'; move = 1; }

        el.value = text.substring(0, start) + val + suffix + text.substring(pos);
        el.selectionStart = el.selectionEnd = start + val.length + (suffix.length - move);
        sBox.style.display = 'none';
        el.focus();
        if(document.getElementById('live-toggle').checked) runCode();
    }

    function handleNav(e) {
        if (sBox.style.display === 'block') {
            const items = sBox.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = (selectedIdx + 1) % items.length; updateActive(items); }
            if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = (selectedIdx - 1 + items.length) % items.length; updateActive(items); }
            if (e.key === 'Enter') { e.preventDefault(); items[selectedIdx].click(); }
            if (e.key === 'Escape') sBox.style.display = 'none';
        }
    }

    function updateActive(items) { items.forEach((it, i) => it.classList.toggle('active', i === selectedIdx)); }

    // --- SYSTEM UI ---
    function runCode() {
        const h = document.getElementById('html-code').value;
        const c = `<style>${document.getElementById('css-code').value}</style>`;
        const j = `<script>${document.getElementById('js-code').value}<\/script>`;
        const out = document.getElementById('output').contentWindow.document;
        out.open(); out.write(h + c + j); out.close();
    }

    function toggleBox(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
    
    function updateEditorStyles() {
        const fs = document.getElementById('font-size-sel').value;
        const ff = document.getElementById('font-family-sel').value;
        document.querySelectorAll('textarea').forEach(tx => {
            tx.style.fontSize = fs;
            tx.style.fontFamily = ff;
        });
    }

    function beautifyCode() {
        const h = document.getElementById('html-code');
        h.value = h.value.replace(/>\s+</g, '><').replace(/(<[^>]+>)/g, '$1\n').trim();
        runCode();
    }

    function exportCode() {
        const code = `<!DOCTYPE html><html><head><style>${document.getElementById('css-code').value}</style></head><body>${document.getElementById('html-code').value}<script>${document.getElementById('js-code').value}<\/script></body></html>`;
        const blob = new Blob([code], {type: "text/html"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "index.html"; a.click();
    }

    function setDevice(m) { document.getElementById('wrapper').className = 'iframe-wrapper ' + (m==='mobile'?'mobile':''); }
    function toggleSettings() { document.getElementById('settingsPanel').classList.toggle('open'); }

    document.addEventListener('click', (e) => { if(!e.target.classList.contains('suggestion-item')) sBox.style.display = 'none'; });
    window.onload = runCode;
</script>
</body>
</html>
