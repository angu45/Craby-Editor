<!DOCTYPE html>
<html lang="en" style="--bg: #0d1117; --panel: #161b22; --accent: #ffb400; --border-color: #30363d;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craby Editor - Professional Web IDE</title>
    
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor.">
    <meta name="keywords" content="free online html editor, Craby Editor, Anguworkshop">
    <meta name="author" content="Anguworkshop">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://craby-editor-ieoz2pm6f-angutais-projects.vercel.app/style.css">

    <style>
        /* जास्तीची स्टाईल जी दोन्ही लेआउटला मॅच करेल */
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --accent: #ffb400;
            --border-color: #30363d;
        }
        body { background-color: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .icon-btn i { color: var(--accent); }
        .run-btn { background: rgba(255, 180, 0, 0.1) !important; border: 1px solid var(--accent) !important; color: var(--accent) !important; font-weight: bold; }
        
        /* Settings Panel Style */
        .settings-panel {
            display: none;
            position: fixed;
            right: 20px;
            top: 70px;
            width: 320px;
            background: var(--panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            z-index: 9999;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .s-group { margin-bottom: 20px; }
        .s-group label { display: block; font-size: 13px; color: #8b949e; margin-bottom: 8px; }
        .s-group select, .s-group input {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px;
            border-radius: 6px;
        }
        .checkbox-group { display: flex; gap: 15px; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: white; }
    </style>
</head>
<body>

<header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border-color);">
    <div class="logo-container" style="display: flex; align-items: center; gap: 10px;">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" height="35">
        <span class="logo-text" style="font-weight: 800; font-size: 1.2rem; letter-spacing: 1px;">CRABY EDITOR</span>
    </div>
    
    <div class="header-actions" style="display: flex; gap: 15px;">
        <button class="icon-btn" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download Project"><i class="fas fa-download"></i></button>
        <button id="run-btn" class="icon-btn run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
    </div>
</header>

<div id="shutter-trigger" onclick="toggleShutter()" style="position: fixed; left: 0; top: 50%; transform: translateY(-50%); background: var(--panel); padding: 10px; border-radius: 0 8px 8px 0; border: 1px solid var(--border-color); cursor: pointer; z-index: 100;">
    <i class="fas fa-chevron-right" style="color: var(--accent);"></i>
</div>

<div class="main-container">
    <div id="editor-grid" class="editor-grid">
        </div>
</div>

<div id="shutter" class="shutter">
    <div class="shutter-header" style="display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border-color);">
        <h3 style="margin: 0; font-size: 1rem; color: var(--accent);">TASKBAR</h3>
        <i class="fas fa-times" onclick="toggleShutter()" style="cursor: pointer;"></i>
    </div>
    <div style="padding: 15px;">
        <button class="add-btn" onclick="addNewFilePrompt()" style="width: 100%; padding: 10px; background: var(--accent); border: none; border-radius: 6px; font-weight: bold; cursor: pointer;"><i class="fas fa-plus"></i> NEW FILE</button>
    </div>
    <div id="shutter-file-list" class="shutter-list"></div>
</div>
<div id="settingsPanel" class="settings-panel" style="display: none; position: fixed; right: 20px; top: 70px; width: 320px; background: var(--panel); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0; color: var(--accent); font-family: 'Plus Jakarta Sans', sans-serif;">IDE Settings</h3>
        <i class="fas fa-times" onclick="toggleSettings()" style="cursor: pointer; color: #ff4d4d;"></i>
    </div>

    <div class="s-group" style="margin-bottom: 20px;">
        <label style="display: block; font-size: 12px; color: #8b949e; margin-bottom: 8px; font-weight: bold;">SHOW/HIDE EDITORS</label>
        <div style="display: flex; gap: 15px;">
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;"><input type="checkbox" id="chk-html" checked> HTML</label>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;"><input type="checkbox" id="chk-css" checked> CSS</label>
            <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px;"><input type="checkbox" id="chk-js" checked> JS</label>
        </div>
    </div>

    <div class="s-group" style="margin-bottom: 20px;">
        <label style="display: block; font-size: 12px; color: #8b949e; margin-bottom: 8px; font-weight: bold;">FONT FAMILY</label>
        <select id="font-family-sel" style="width: 100%; background: #0d1117; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; outline: none; cursor: pointer;">
            <option value="'Fira Code', monospace">Fira Code (Default)</option>
            <option value="'JetBrains Mono', monospace">JetBrains Mono</option>
            <option value="'Source Code Pro', monospace">Source Code Pro</option>
            <option value="'Courier New', monospace">Courier New</option>
            <option value="'Consolas', monospace">Consolas</option>
            <option value="'Roboto Mono', monospace">Roboto Mono</option>
            <option value="'Ubuntu Mono', monospace">Ubuntu Mono</option>
            <option value="monospace">System Monospace</option>
        </select>
    </div>

    <div class="s-group" style="margin-bottom: 20px;">
        <label style="display: block; font-size: 12px; color: #8b949e; margin-bottom: 8px; font-weight: bold;">EDITOR THEME</label>
        <select id="theme-sel" style="width: 100%; background: #0d1117; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 6px; outline: none; cursor: pointer;">
            <option value="dark">Github Dark (Default)</option>
            <option value="light">Simple Light</option>
            <option value="monokai">Monokai Pro</option>
            <option value="dracula">Dracula</option>
            <option value="matrix">Matrix Green</option>
            <option value="nord">Nordic Blue</option>
            <option value="midnight">Midnight Deep</option>
            <option value="solarized">Solarized Dark</option>
            <option value="cyberpunk">Cyberpunk Neon</option>
            <option value="evergreen">Evergreen Forest</option>
            <option value="midnight_purple">Midnight Purple</option>
            <option value="oceanic">Oceanic Blue</option>
        </select>
    </div>

    <button onclick="toggleSettings()" style="width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 6px; font-weight: 800; cursor: pointer; color: #000; transition: 0.3s; margin-top: 10px;">
        SAVE & CLOSE
    </button>
</div>


<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header" style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border-color);">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" height="25">
            <span style="font-size: 0.9rem; font-weight: bold;">LIVE PREVIEW</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button class="icon-btn" title="Desktop View"><i class="fas fa-desktop"></i></button>
            <button class="icon-btn" title="Mobile View"><i class="fas fa-mobile-alt"></i></button>
            <button onclick="closePreview()" style="background: #ff4d4d; color: white; border: none; padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;">CLOSE</button>
        </div>
    </div>
    <div class="overlay-body">
        <div id="wrapper" class="iframe-wrapper" style="height: calc(100vh - 60px); width: 100%;">
            <iframe id="output-frame" style="width: 100%; height: 100%; border: none; background: white;"></iframe>
        </div>
    </div>
</div>

<div id="suggestion-box" style="display: none;"></div>

<script src="main-logic.js"></script>
<script src="script2.js"></script>

<script>
    // Toggle Settings Panel
    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    // Close Preview (जर तुमच्या फाईलमध्ये नसेल तर)
    function closePreview() {
        document.getElementById('preview-overlay').style.display = 'none';
    }

    // Run Code function (तुमच्या script ला कॉल करेल)
    function runCode() {
        document.getElementById('preview-overlay').style.display = 'block';
        // तुमची मूळ Logic इथे काम करेल
    }
</script>

</body>
</html>
