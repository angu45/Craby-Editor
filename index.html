<body>

<!-- LOADER -->
<div id="craby-loader"
style="
position:fixed;
inset:0;
background:var(--bg-main);
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
transition:opacity 0.5s cubic-bezier(0.4,0,0.2,1);
">

<div style="text-align:center;width:250px;">

<img src="Logo.png"
style="
width:110px;
height:auto;
margin-bottom:20px;
filter:drop-shadow(0 0 10px var(--accent));
">

<div style="
font-size:28px;
font-weight:900;
color:var(--accent);
margin-bottom:12px;
letter-spacing:1px;
">

<span id="load-val">0</span>%

</div>

<div style="
width:100%;
height:6px;
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
border:1px solid var(--border);
">

<div id="bar-fill"
style="
height:100%;
width:0%;
background:var(--accent);
box-shadow:0 0 20px var(--accent);
transition:width 0.4s;
"></div>

</div>
</div>
</div>

<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TTVQBL6S"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>

<header>

<div class="logo-container">
<img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png">
</div>

<div class="header-actions">

<button class="icon-btn" onclick="beautifyCode()">
<i class="fas fa-magic"></i>
</button>

<button class="icon-btn" onclick="exportCode()">
<i class="fas fa-download"></i>
</button>

<button id="run-btn" class="icon-btn run-btn" onclick="runCode()">
<i class="fas fa-play"></i> RUN
</button>

<button class="icon-btn" onclick="toggleSettings()">
<i class="fas fa-sliders-h"></i>
</button>

</div>

</header>

<div id="shutter-trigger" onclick="toggleShutter()">
<i class="fas fa-chevron-right"></i>
</div>

<main class="main-container">
<div id="editor-grid" class="editor-grid"></div>
</main>

<div id="shutter" class="shutter">

<div class="shutter-header">
<h3 style="color: var(--accent);">TASKBAR</h3>
<div id="taskbar-files"></div>
<i class="fas fa-times" onclick="toggleShutter()"></i>
</div>

<div class="shutter-list">

<button class="add-btn" onclick="addNewFilePrompt()">
<i class="fas fa-plus"></i> NEW FILE
</button>

<div id="shutter-file-list"></div>

</div>
</div>

<div id="settingsPanel" class="settings-panel">

<h3 style="color: var(--accent);">IDE Settings</h3>

<select id="theme-sel" onchange="updateThemeAndFont()">
<option value="dark">Github Dark</option>
<option value="monokai">Monokai</option>
<option value="dracula">Dracula</option>
<option value="light">Light</option>
</select>

</div>

<div id="preview-overlay" class="preview-overlay">

<div class="overlay-header">

<button class="icon-btn" onclick="refreshPreview()">
<i class="fas fa-sync-alt"></i>
</button>

<button class="icon-btn" onclick="setPreviewSize('100%')">
<i class="fas fa-desktop"></i>
</button>

<button class="icon-btn" onclick="setPreviewSize('375px')">
<i class="fas fa-mobile-alt"></i>
</button>

<button onclick="closePreview()" class="icon-btn">CLOSE</button>

</div>

<div id="preview-body"
style="flex:1;display:flex;justify-content:center;align-items:center;background:#1e1e1e;">

<iframe id="output-frame"
style="width:100%;height:100%;background:white;"></iframe>

</div>
</div>

<script src="theme-settings.js"></script>
<script src="main-logic.js"></script>
<script src="script2.js"></script>

</body>
</html>
