<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Free Online HTML, CSS, JS Editor | Anguworkshop</title>
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor by Anguworkshop. Write, preview, and export HTML, CSS, and JS code instantly.">
    <meta name="keywords" content="Craby Editor, Craby HTML Editor, Anguworkshop, Online HTML Editor, Live Preview Editor, Web Development Tool">
    <meta name="author" content="Anguworkshop">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Craby Editor Logo">
        <span class="logo-text">CRABY ULTRA</span>
    </div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="beautifyCode()" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download File"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b><i class="fas fa-play"></i> RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section">
        <div class="editor-box">
            <div class="label">HTML <i class="fas fa-code"></i></div>
            <textarea id="html-code" spellcheck="false"><h1>Welcome to Craby Editor</h1></textarea>
        </div>
        <div class="editor-box">
            <div class="label">CSS <i class="fab fa-css3-alt"></i></div>
            <textarea id="css-code" spellcheck="false">h1 { color: #ffb400; text-align: center; font-family: sans-serif; }</textarea>
        </div>
        <div class="editor-box">
            <div class="label">JAVASCRIPT <i class="fab fa-js"></i></div>
            <textarea id="js-code" spellcheck="false">console.log('Running...');</textarea>
        </div>
    </div>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <div class="logo-container">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" style="height: 25px;">
            <span class="logo-text" style="font-size: 1rem;">LIVE PREVIEW</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="setDevice('desktop')"><i class="fas fa-desktop"></i></button>
            <button class="icon-btn" onclick="setDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
            <button class="icon-btn" style="background: #ff4d4d !important; color: white !important; border:none;" onclick="closePreview()"><b>CLOSE</b></button>
        </div>
    </div>
    <div class="overlay-body">
        <div id="wrapper" class="iframe-wrapper">
            <iframe id="output"></iframe>
        </div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <h3 style="color: var(--accent); display: flex; justify-content: space-between; align-items: center;">
        IDE Settings 
        <i class="fas fa-times" onclick="toggleSettings()" style="cursor:pointer; color: #ff4d4d;"></i>
    </h3>
    <br>
    <div class="s-group">
        <label>Font Size</label>
        <select id="font-size-sel" onchange="updateEditorStyles()">
            <option value="14px" selected>14px</option>
            <option value="16px">16px</option>
            <option value="18px">18px</option>
        </select>
    </div>
    <button class="icon-btn" style="width:100%; background: var(--accent); color: #000; border:none; justify-content: center;" onclick="toggleSettings()"><b>SAVE & CLOSE</b></button>
</div>

<script src="script.js"></script>
</body>
</html>
