<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Free Online HTML, CSS, JS Editor | Live Preview</title>
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor by Anguworkshop. Write, preview, and export HTML, CSS, and JS code instantly with live preview.">
    <meta name="keywords" content="free online html editor, html compiler, Craby Editor, Anguworkshop, online code editor, live preview editor, web development tool">
    <meta name="author" content="Anguworkshop">
    <link rel="canonical" href="https://craby-editor.vercel.app/">

    <link rel="icon" type="image/png" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">

    <meta property="og:title" content="Craby Editor - Free Online Code Editor">
    <meta property="og:description" content="Edit, preview, and build web projects instantly with Craby Editor.">
    <meta property="og:image" content="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">
    <meta property="og:url" content="https://craby-editor.vercel.app/">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z0BGJ1913H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Z0BGJ1913H');
    </script>

    <script type="application/ld+json">
    {
      "@context" : "https://schema.org",
      "@type" : "WebSite",
      "name" : "Craby-Editor",
      "url" : "https://craby-editor.vercel.app"
    }
    </script>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Craby Editor Logo">
        <h1 style="display:none;">Craby Editor - Best Online HTML Editor</h1> </div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="beautifyCode()" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download File"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b><i class="fas fa-play"></i> RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section">
        <div class="editor-box">
            <div class="label">HTML <i class="fas fa-code"></i></div>
            <textarea id="html-code" spellcheck="false"><h1>Welcome to Craby Html Editor</h1></textarea>
        </div>
        <div class="editor-box">
            <div class="label">CSS <i class="fab fa-css3-alt"></i></div>
            <textarea id="css-code" spellcheck="false">
h1 {  
    color: #ffb400; 
    text-align: center; 
    font-family: sans-serif;
}
            </textarea>
        </div>
        <div class="editor-box">
            <div class="label">JAVASCRIPT <i class="fab fa-js"></i></div>
            <textarea id="js-code" spellcheck="false">console.log('Running...');</textarea>
        </div>
    </div>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <div class="logo-container">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" style="height: 25px;">
            <span class="logo-text" style="font-size: 1rem;">LIVE PREVIEW</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="setDevice('desktop')"><i class="fas fa-desktop"></i></button>
            <button class="icon-btn" onclick="setDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
            <button class="icon-btn" style="background: #ff4d4d !important; color: white !important; border:none;" onclick="closePreview()"><b>CLOSE</b></button>
        </div>
    </div>
    <div class="overlay-body">
        <div id="wrapper" class="iframe-wrapper">
            <iframe id="output"></iframe>
        </div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <h3 style="color: var(--accent); display: flex; justify-content: space-between;">
        IDE Settings <i class="fas fa-times" onclick="toggleSettings()" style="cursor:pointer; color: #ff4d4d;"></i>
    </h3>
    <br>
    <div class="s-group">
        <label>Show/Hide Editors</label>
        <div style="display: flex; gap: 10px; font-size: 12px;">
            <label><input type="checkbox" id="chk-html" checked onchange="updateVisibility()"> HTML</label>
            <label><input type="checkbox" id="chk-css" checked onchange="updateVisibility()"> CSS</label>
            <label><input type="checkbox" id="chk-js" onchange="updateVisibility()"> JS</label>
        </div>
    </div>

    <div class="s-group">
        <label>Font Family</label>
        <select id="font-family-sel" onchange="updateThemeAndFont()">
            <option value="'Fira Code', monospace">Fira Code</option>
            <option value="'Courier New', monospace">Courier New</option>
            <option value="'Consolas', monospace">Consolas</option>
            <option value="'Source Code Pro', monospace">Source Code Pro</option>
            <option value="monospace">System Monospace</option>
        </select>
    </div>

    <div class="s-group">
        <label>Font Size: <span id="fs-display">16px</span></label>
        <input type="range" id="font-size-bar" min="5" max="50" value="16" oninput="updateThemeAndFont()" style="width:100%; cursor: pointer;">
    </div>
 
    <div class="s-group">
        <label>Editor Theme</label>
        <select id="theme-sel" onchange="updateThemeAndFont()">
            <option value="dark">Github Dark</option>
            <option value="light">Simple Light</option>
            <option value="monokai">Monokai Pro</option>
            <option value="dracula">Dracula</option>
            <option value="matrix">Matrix Green</option>
            <option value="nord">Nordic Blue</option>
            <option value="midnight">Midnight Deep</option>
            <option value="solarized">Solarized Dark</option>
            <option value="cyberpunk">Cyberpunk Neon</option>
            <option value="evergreen">Evergreen Dark</option>
            <option value="midnight_purple">Midnight Purple</option>
            <option value="oceanic">Oceanic Blue</option>
        </select>
    </div>

    <button class="icon-btn" style="width:100%; background: var(--accent); color: #000; justify-content: center;" onclick="toggleSettings()"><b>SAVE & CLOSE</b></button>
</div>

<script src="Script.js"></script> 

<script>
function updateThemeAndFont() {
    const themeKey = document.getElementById('theme-sel').value;
    const font = document.getElementById('font-family-sel').value;
    const fontSize = document.getElementById('font-size-bar').value;
    document.getElementById('fs-display').innerText = fontSize + "px"; 

    // Themes object 'Script.js' madhe asne garjeche aahe
    const theme = (typeof themes !== 'undefined') ? (themes[themeKey] || themes.dark) : null;

    if (theme) {
        document.documentElement.style.setProperty('--bg', theme.bg);
        document.documentElement.style.setProperty('--panel', theme.panel);
        document.documentElement.style.setProperty('--accent', theme.accent);
        
        document.querySelectorAll('textarea').forEach(tx => {
            tx.style.fontFamily = font;
            tx.style.fontSize = fontSize + "px"; 
            tx.style.color = theme.text;
            tx.style.background = theme.bg;
            if(theme.border) tx.closest('.editor-box').style.borderColor = theme.border;
        });

        document.querySelectorAll('.label, .icon-btn i').forEach(el => {
            if(el.classList.contains('label')) el.style.background = theme.panel;
            el.style.color = theme.accent;
        });
    }
}
</script>

</body>
</html>
