<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>

<div id="shutterBtn" onclick="toggleLeftSidebar()">
    <i class="fas fa-chevron-right"></i>
</div>

<div class="left-sidebar" id="leftSidebar">
    <div class="sidebar-header" style="display:flex; justify-content: space-between; margin-bottom: 20px;">
        <h4>EXPLORER</h4>
        <i class="fas fa-times" onclick="toggleLeftSidebar()" style="cursor:pointer; color:var(--accent)"></i>
    </div>
    
    <button class="icon-btn new-file-btn" onclick="addNewFile()">
        <i class="fas fa-plus"></i> NEW FILE
    </button>

    <div class="file-list" id="file-list-container">
        </div>
</div>

<div class="main-container">
    <div class="editor-section" id="editorSection">
        <div class="editor-box">
            <div class="label">
                <span>HTML <i class="fas fa-code"></i></span>
                <div class="window-actions">
                    <i class="fas fa-minus" onclick="toggleMinimize('html-code')" title="Minimize"></i>
                    <i class="fas fa-expand" onclick="toggleFullscreen('html-code')" title="Fullscreen"></i>
                    <i class="fas fa-trash" onclick="deleteFile('html-code')" title="Delete"></i>
                </div>
            </div>
            <textarea id="html-code" spellcheck="false"><!DOCTYPE html>
<html>
<body>
    <h1>Welcome to Craby Editor</h1>
</body>
</html></textarea>
        </div>
        
        <div class="editor-box">
            <div class="label">
                <span>CSS <i class="fas fa-paint-brush"></i></span>
                <div class="window-actions">
                    <i class="fas fa-minus" onclick="toggleMinimize('css-code')" title="Minimize"></i>
                    <i class="fas fa-expand" onclick="toggleFullscreen('css-code')" title="Fullscreen"></i>
                    <i class="fas fa-trash" onclick="deleteFile('css-code')" title="Delete"></i>
                </div>
            </div>
            <textarea id="css-code" spellcheck="false">h1 { 
    color: #ffb400; 
}</textarea>
        </div>
        
        <div class="editor-box">
            <div class="label">
                <span>JS <i class="fab fa-js"></i></span>
                <div class="window-actions">
                    <i class="fas fa-minus" onclick="toggleMinimize('js-code')" title="Minimize"></i>
                    <i class="fas fa-expand" onclick="toggleFullscreen('js-code')" title="Fullscreen"></i>
                    <i class="fas fa-trash" onclick="deleteFile('js-code')" title="Delete"></i>
                </div>
            </div>
            <textarea id="js-code" spellcheck="false">console.log('Smart Height Active');</textarea>
        </div>
    </div>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <div class="logo-container">
            <span class="logo-text">LIVE PREVIEW</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="allowFullscreen()"><i class="fas fa-desktop"></i></button>
            <button class="icon-btn" style="background: #ff4d4d !important; color: white !important; border:none;" onclick="closePreview()"><b>CANCEL</b></button>
        </div>
    </div>
    <div class="overlay-body">
        <div id="wrapper" class="iframe-wrapper">
            <iframe id="output"></iframe>
        </div>
    </div>
</div>

<script src="main-logic.js"></script> </body>
</html>
