<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Free Online HTML, CSS, JS Editor | Live Preview</title>
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor by Anguworkshop. Write, preview, and export HTML, CSS, and JS code instantly with live preview.">
    <meta name="keywords" content="free online html editor, html compiler, Craby Editor, Anguworkshop, online code editor, live preview editor, web development tool">
    <meta name="author" content="Anguworkshop">
    <link rel="canonical" href="https://craby-editor.vercel.app/">

    <link rel="icon" type="image/png" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">

    <meta property="og:title" content="Craby Editor - Free Online Code Editor">
    <meta property="og:description" content="Edit, preview, and build web projects instantly with Craby Editor.">
    <meta property="og:image" content="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">
    <meta property="og:url" content="https://craby-editor.vercel.app/">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z0BGJ1913H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Z0BGJ1913H');
    </script>

    <script type="application/ld+json">
    {
      "@context" : "https://schema.org",
      "@type" : "WebSite",
      "name" : "Craby-Editor",
      "url" : "https://craby-editor.vercel.app"
    }
    </script>
</head>
<body>

<div class="sidebar-shutter" onclick="toggleSidebar()" id="shutterBtn">
    <i class="fas fa-chevron-right"></i>
</div>

<div class="action-sidebar" id="actionSidebar">
    <div class="sidebar-header">
        <span>File Manager</span>
        <i class="fas fa-times" onclick="toggleSidebar()"></i>
    </div>
    <div class="sidebar-content">
        <button class="side-btn" title="New File"><i class="fas fa-plus"></i> NEW FILE</button>
        <hr style="border: 0.5px solid var(--border); margin: 15px 0;">
        
        <label style="font-size: 10px; opacity: 0.6; display: block; margin-bottom: 10px;">ACTIVE FILES</label>
        <div class="file-list">
            <div class="file-item active">index.html</div>
            <div class="file-item">style.css</div>
            <div class="file-item">script.js</div>
        </div>

        <hr style="border: 0.5px solid var(--border); margin: 15px 0;">
        <label style="font-size: 10px; opacity: 0.6; display: block; margin-bottom: 10px;">HISTORY</label>
        <div style="display: flex; gap: 10px;">
            <button class="side-btn" onclick="undoCode()"><i class="fas fa-undo"></i> Undo</button>
            <button class="side-btn" onclick="redoCode()"><i class="fas fa-redo"></i> Redo</button>
        </div>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Craby Editor Logo">
        <h1 style="display:none;">Craby Editor</h1> 
    </div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="beautifyCode()" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download File"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b><i class="fas fa-play"></i> RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section">
        <div class="editor-box" id="box-html">
            <div class="label">
                <span>HTML <i class="fas fa-code"></i></span>
                <div class="window-controls">
                    <i class="fas fa-minus" onclick="minimizeBox('html')"></i>
                    <i class="fas fa-expand" onclick="expandBox('html')"></i>
                    <i class="fas fa-trash" onclick="clearCode('html')"></i>
                </div>
            </div>
            <textarea id="html-code" spellcheck="false"><!DOCTYPE html>
<html>
<body>
    <h1>Welcome to Craby Editor</h1>
</body>
</html></textarea>
        </div>

        <div class="editor-box" id="box-css">
            <div class="label">
                <span>CSS <i class="fab fa-css3-alt"></i></span>
                <div class="window-controls">
                    <i class="fas fa-minus" onclick="minimizeBox('css')"></i>
                    <i class="fas fa-expand" onclick="expandBox('css')"></i>
                    <i class="fas fa-trash" onclick="clearCode('css')"></i>
                </div>
            </div>
            <textarea id="css-code" spellcheck="false">h1 { color: #ffb400; text-align: center; }</textarea>
        </div>

        <div class="editor-box" id="box-js">
            <div class="label">
                <span>JS <i class="fab fa-js"></i></span>
                <div class="window-controls">
                    <i class="fas fa-minus" onclick="minimizeBox('js')"></i>
                    <i class="fas fa-expand" onclick="expandBox('js')"></i>
                    <i class="fas fa-trash" onclick="clearCode('js')"></i>
                </div>
            </div>
            <textarea id="js-code" spellcheck="false">console.log('Ready');</textarea>
        </div>
    </div>
</div>

<script src="Script.js"></script> 
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('actionSidebar');
        const shutter = document.getElementById('shutterBtn');
        sidebar.classList.toggle('open');
        shutter.classList.toggle('active');
        
        const icon = shutter.querySelector('i');
        if(sidebar.classList.contains('open')) {
            icon.className = 'fas fa-chevron-left';
        } else {
            icon.className = 'fas fa-chevron-right';
        } 
    }
</script>

</body>
</html>
