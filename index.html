<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Free Online HTML, CSS, JS Editor | Anguworkshop</title>
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor by Anguworkshop. Write, preview, and export HTML, CSS, and JS code instantly.">
    <meta name="keywords" content="Craby Editor, Craby HTML Editor, Anguworkshop, Online HTML Editor, Live Preview Editor, Web Development Tool">
    <meta name="author" content="Anguworkshop">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Craby Editor - Online Code Playground">
    <meta property="og:description" content="Write and test your web code instantly with Craby Editor.">
    <meta property="og:image" content="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --accent: #ffb400; --text: #c9d1d9; --border: rgba(255, 255, 255, 0.1); --header: #010409;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER --- */
        header { 
            background: var(--header); padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            border-bottom: 2px solid var(--accent); z-index: 1000; 
        }
        .logo-container { display: flex; align-items: center; gap: 12px; cursor: default; }
        .logo-container img { height: 35px; pointer-events: none; }
        .logo-text { font-weight: 800; font-size: 1.3rem; color: var(--accent); letter-spacing: 0.5px; }

        .nav-actions { display: flex; gap: 8px; align-items: center; }

        .icon-btn { 
            background: var(--panel); border: 1px solid var(--border); color: var(--text); 
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; 
            display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); background: rgba(255,180,0,0.1); }
        .run-btn { background: var(--accent) !important; color: #000 !important; font-weight: 800; border: none; }

        /* --- MAIN LAYOUT --- */
        .main-container { display: flex; flex: 1; position: relative; overflow: hidden; }
        .editor-section { flex: 1; display: flex; flex-direction: column; }
        .editor-box { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); flex: 1; position: relative; }

        .label { background: rgba(0,0,0,0.4); padding: 6px 15px; font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 1px; display: flex; justify-content: space-between; }
        textarea { flex: 1; background: transparent; border: none; color: #9cdcfe; font-family: 'Fira Code', monospace; padding: 15px; resize: none; outline: none; font-size: 14px; line-height: 1.6; }

        /* --- FLOW SCREEN PREVIEW (OVERLAY) --- */
        .preview-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f1f5f9; z-index: 99999; display: none; flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .overlay-header {
            background: var(--header); padding: 12px 25px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent);
        }
        .overlay-body { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: auto; }

        .iframe-wrapper { width: 100%; height: 100%; background: white; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; transition: 0.3s; }
        .iframe-wrapper.mobile { width: 375px; height: 667px; border: 12px solid #1a1a1a; border-radius: 35px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* --- SETTINGS PANEL (FIXED VISIBILITY) --- */
        .settings-panel { 
            position: fixed; right: -350px; top: 0; 
            width: 320px; height: 100%; 
            background: var(--panel); border-left: 2px solid var(--accent); 
            z-index: 1000000; padding: 25px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            color: white; visibility: hidden;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .settings-panel.open { right: 0; visibility: visible; }
        .s-group { margin-bottom: 20px; }
        .s-group label { display: block; font-size: 12px; margin-bottom: 8px; opacity: 0.8; }
        .s-group select { width: 100%; padding: 10px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 4px; outline: none; }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Craby Editor Logo">
        <span class="logo-text">CRABY ULTRA</span>
    </div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="beautifyCode()" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download File"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b><i class="fas fa-play"></i> RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section">
        <div class="editor-box">
            <div class="label">HTML <i class="fas fa-code"></i></div>
            <textarea id="html-code" spellcheck="false"><h1>Welcome to Craby Editor</h1>
<p>Start writing your code here...</p></textarea>
        </div>
        <div class="editor-box">
            <div class="label">CSS <i class="fab fa-css3-alt"></i></div>
            <textarea id="css-code" spellcheck="false">body { background: #f4f4f4; display: flex; align-items: center; justify-content: center; height: 80vh; font-family: sans-serif; }
h1 { color: #ffb400; text-shadow: 2px 2px #000; }</textarea>
        </div>
        <div class="editor-box">
            <div class="label">JAVASCRIPT <i class="fab fa-js"></i></div>
            <textarea id="js-code" spellcheck="false">console.log('Craby Editor Ultra Running...');</textarea>
        </div>
    </div>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <div class="logo-container">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" style="height: 25px;">
            <span class="logo-text" style="font-size: 1rem;">LIVE PREVIEW</span>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="icon-btn" onclick="setDevice('desktop')"><i class="fas fa-desktop"></i></button>
            <button class="icon-btn" onclick="setDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
            <button class="icon-btn" style="background: #ff4d4d !important; color: white !important; border:none;" onclick="closePreview()"><b><i class="fas fa-times"></i> CLOSE</b></button>
        </div>
    </div>
    <div class="overlay-body">
        <div id="wrapper" class="iframe-wrapper">
            <iframe id="output"></iframe>
        </div>
    </div>
</div>

<div class="settings-panel" id="settingsPanel">
    <h3 style="color: var(--accent); display: flex; justify-content: space-between; align-items: center;">
        IDE Settings 
        <i class="fas fa-times" onclick="toggleSettings()" style="cursor:pointer; font-size: 1.2rem; color: #ff4d4d;"></i>
    </h3>
    <br><hr style="opacity: 0.1;"><br>
    
    <div class="s-group">
        <label>Font Size</label>
        <select id="font-size-sel" onchange="updateEditorStyles()">
            <option value="12px">12px</option>
            <option value="14px" selected>14px</option>
            <option value="16px">16px</option>
            <option value="18px">18px</option>
        </select>
    </div>

    <button class="icon-btn" style="width:100%; margin-top:20px; background: var(--accent); color: #000; border:none; justify-content: center;" onclick="toggleSettings()">
        <b>SAVE & CLOSE</b>
    </button>
</div>

<script>
    // 1. RUN CODE - FLOW SCREEN LOGIC
    function runCode() {
        const overlay = document.getElementById('preview-overlay');
        overlay.style.display = 'flex';

        const html = document.getElementById('html-code').value;
        const css = "<style>" + document.getElementById('css-code').value + "</style>";
        const js = "<script>" + document.getElementById('js-code').value + "<\/script>";
        
        const outFrame = document.getElementById('output');
        const outDoc = outFrame.contentWindow.document;
        outDoc.open();
        outDoc.write(html + css + js);
        outDoc.close();
    }

    // 2. CLOSE PREVIEW
    function closePreview() {
        document.getElementById('preview-overlay').style.display = 'none';
    }

    // 3. SETTINGS TOGGLE (FIXED)
    function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.classList.toggle('open');
    }

    // 4. DEVICE VIEW SWITCHER
    function setDevice(mode) {
        const wrapper = document.getElementById('wrapper');
        wrapper.className = 'iframe-wrapper ' + (mode === 'mobile' ? 'mobile' : '');
    }

    // 5. BEAUTIFY HTML
    function beautifyCode() {
        const h = document.getElementById('html-code');
        h.value = h.value.replace(/>\s+</g, '><').replace(/(<[^>]+>)/g, '$1\n').trim();
    }

    // 6. EXPORT CODE
    function exportCode() {
        const fullContent = `<!DOCTYPE html><html><head><style>${document.getElementById('css-code').value}</style></head><body>${document.getElementById('html-code').value}<script>${document.getElementById('js-code').value}<\/script></body></html>`;
        const blob = new Blob([fullContent], {type: "text/html"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "index.html";
        link.click();
    }

    // 7. UPDATE STYLES
    function updateEditorStyles() {
        const fs = document.getElementById('font-size-sel').value;
        document.querySelectorAll('textarea').forEach(tx => tx.style.fontSize = fs);
    }

    // Baher click kelyavar settings close honyasathi
    document.addEventListener('mousedown', function(e) {
        const panel = document.getElementById('settingsPanel');
        const btn = document.querySelector('.fa-sliders-h').parentElement;
        if (!panel.contains(e.target) && !btn.contains(e.target) && panel.classList.contains('open')) {
            panel.classList.remove('open');
        }
    });
</script>

</body>
</html>
