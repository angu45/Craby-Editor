<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Free Online HTML, CSS, JS Editor | Anguworkshop</title>
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor by Anguworkshop. Write, preview, and export HTML, CSS, and JS code instantly.">
    <meta name="keywords" content="Craby Editor, Craby HTML Editor, Anguworkshop, Online HTML Editor, Live Preview Editor, Web Development Tool">
    <meta name="author" content="Anguworkshop">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Craby Editor - Online Code Playground">
    <meta property="og:description" content="Write and test your web code instantly with Craby Editor.">
    <meta property="og:image" content="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Craby Editor | Anguworkshop">
    <meta property="twitter:description" content="Best lightweight online HTML editor with live preview.">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
        <a href="https://ibb.co/NgdbB0sm" target="_blank">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">
        </a>
          </div>
   <div class="nav-actions">
    <button class="icon-btn" onclick="beautifyCode()"><i class="fas fa-magic"></i></button>
    <button class="icon-btn" onclick="exportCode()"><i class="fas fa-download"></i></button>
    <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-sliders-h"></i></button>
    <button class="icon-btn run-btn" id="run-btn-main" onclick="runCode()"><b><i class="fas fa-play"></i> RUN</b></button>
</div>

<script src="Script.js"></script>
</header>

<div class="main-container">
    <div class="editor-section">
        <div class="editor-box" id="html-box">
            <div class="label">HTML <i class="fas fa-code"></i></div>
            <textarea id="html-code" oninput="handleInput(this, 'html')" onkeydown="handleNav(event)" spellcheck="false"><h1>Hello!</h1></textarea>
        </div>
        <div class="editor-box" id="css-box">
            <div class="label">CSS <i class="fab fa-css3-alt"></i></div>
            <textarea id="css-code" oninput="handleInput(this, 'css')" onkeydown="handleNav(event)" spellcheck="false">h1 { color: #ffb400; text-align: center; font-family: sans-serif; }</textarea>
        </div>
        <div class="editor-box" id="js-box">
            <div class="label">JAVASCRIPT <i class="fab fa-js"></i></div>
            <textarea id="js-code" oninput="handleInput(this, 'js')" onkeydown="handleNav(event)" spellcheck="false">console.log('Craby Editor Loaded');</textarea>
        </div>
        <div id="suggestion-box"></div>
    </div>
</div>

<div id="preview-overlay" class="preview-overlay">
    <div class="overlay-header">
        <div class="overlay-logo">
            <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo" style="height: 25px;">
            <span>PREVIEW MODE</span>
        </div>
        <div class="device-toggles">
            <button class="icon-btn" onclick="setDevice('desktop')"><i class="fas fa-desktop"></i></button>
            <button class="icon-btn" onclick="setDevice('mobile')"><i class="fas fa-mobile-alt"></i></button>
        </div>
        <button class="close-btn" onclick="closePreview()"><i class="fas fa-times"></i> Close</button>
    </div>
    <div class="overlay-body">
        <div id="wrapper" class="iframe-wrapper">
            <iframe id="output"></iframe>
        </div>
    </div>
</div>

<script src="Script.js"></script>
</body>
</html>
