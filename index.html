<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Smart Mobile-First Code Editor</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head><body>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">
        <span class="logo-text">Craby Editor</span>
    </div>
    <div class="header-actions">
        <button class="icon-btn run-btn" onclick="runCode()"><i class="fas fa-play"></i> RUN</button>
        <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
    </div>
</header>

<div id="shutter-trigger" onclick="toggleShutter()">
    <i class="fas fa-chevron-right"></i>
</div>

<div class="main-container">
    <div id="editor-grid" class="editor-grid">
        </div>
</div>

<div id="shutter" class="shutter">
    <div style="display:flex; justify-content:space-between; color:var(--accent); margin-bottom:20px;">
        <h3>FILES</h3>
        <i class="fas fa-times" onclick="toggleShutter()" style="cursor:pointer"></i>
    </div>
    <div id="shutter-file-list"></div>
</div>

<div id="settings-panel" class="settings-panel">
    <div style="display:flex; justify-content:space-between; color:var(--accent); margin-bottom:20px;">
        <h3>IDE SETTINGS</h3>
        <i class="fas fa-times" onclick="toggleSettings()" style="cursor:pointer"></i>
    </div>
    </div>

<script src="main-logic.js"></script>
</body>

</body>
</html>
