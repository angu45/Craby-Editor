<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Craby Editor - Free Online HTML, CSS, JS Editor | Live Preview</title>
    <meta name="description" content="Craby Editor is a powerful and lightweight online HTML editor by Anguworkshop. Write, preview, and export HTML, CSS, and JS code instantly with live preview.">
    <meta name="keywords" content="free online html editor, html compiler, Craby Editor, Anguworkshop, online code editor, live preview editor, web development tool">
    <meta name="author" content="Anguworkshop">
    <link rel="canonical" href="https://craby-editor.vercel.app/">

    <link rel="icon" type="image/png" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">

    <meta property="og:title" content="Craby Editor - Free Online Code Editor">
    <meta property="og:description" content="Edit, preview, and build web projects instantly with Craby Editor.">
    <meta property="og:image" content="https://i.ibb.co/q3zXdVb3/1000176146-removebg-preview.png">
    <meta property="og:url" content="https://craby-editor.vercel.app/">

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z0BGJ1913H"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Z0BGJ1913H');
    </script>

    <script type="application/ld+json">
    {
      "@context" : "https://schema.org",
      "@type" : "WebSite",
      "name" : "Craby-Editor",
      "url" : "https://craby-editor.vercel.app"
    }
    </script>
</head>
<body>

<div class="sidebar-shutter" onclick="toggleSidebar()" id="shutterBtn">
    <i class="fas fa-chevron-right"></i>
</div>

<div class="action-sidebar" id="actionSidebar">
    <div class="sidebar-header">
        <span>EXPLORER</span>
        <i class="fas fa-plus" title="New File" onclick="createNewFile()"></i>
    </div>
    <div class="sidebar-content">
        <label class="side-label">OPEN EDITORS</label>
        <div id="file-list" class="file-list">
            </div>
        
        <div class="sidebar-footer-actions">
            <button class="side-btn" onclick="undoCode()"><i class="fas fa-undo"></i> Undo</button>
            <button class="side-btn" onclick="redoCode()"><i class="fas fa-redo"></i> Redo</button>
        </div>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Craby Editor Logo">
        <h1 style="display:none;">Craby Editor</h1> 
    </div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="beautifyCode()" title="Format Code"><i class="fas fa-magic"></i></button>
        <button class="icon-btn" onclick="exportCode()" title="Download File"><i class="fas fa-download"></i></button>
        <button class="icon-btn" onclick="toggleSettings()" title="Settings"><i class="fas fa-sliders-h"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b><i class="fas fa-play"></i> RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section" id="editor-wrapper">
        </div>
</div>

<div id="preview-overlay" class="preview-overlay" style="display:none;">
    <div class="preview-header">
        <span>Live Preview</span>
        <i class="fas fa-times" onclick="closePreview()"></i>
    </div>
    <iframe id="output"></iframe>
</div>

<div id="settingsPanel" class="settings-panel">
    <h3>Settings</h3>
    <hr>
    <label>Theme</label>
    <select id="theme-sel" onchange="updateThemeAndFont()">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
        <option value="monokai">Monokai</option>
        <option value="dracula">Dracula</option>
        <option value="matrix">Matrix</option>
    </select>
    <label>Font Family</label>
    <select id="font-family-sel" onchange="updateThemeAndFont()">
        <option value="'Fira Code', monospace">Fira Code</option>
        <option value="'Plus Jakarta Sans', sans-serif">Jakarta Sans</option>
    </select>
</div>

<script src="Script.js"></script> 
</body>
</html>
