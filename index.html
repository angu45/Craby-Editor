<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craby Editor Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css"> </head>
<body>

<div class="sidebar-shutter" onclick="toggleSidebar()" id="shutterBtn">
    <i class="fas fa-chevron-right"></i>
</div>

<div class="action-sidebar" id="leftSidebar">
    <div class="sidebar-header">
        <span>EXPLORER</span>
        <i class="fas fa-plus" title="New File" onclick="createNewFile()"></i>
    </div>
    <div class="sidebar-content">
        <label class="side-label">OPEN EDITORS</label>
        <div id="file-list" class="file-list">
            </div>
    </div>
</div>

<header>
    <div class="logo-container">
        <img src="https://i.ibb.co/4wn3rb7Y/1000176075-removebg-preview.png" alt="Logo">
    </div>
    <div class="nav-actions">
        <button class="icon-btn" onclick="beautifyCode()"><i class="fas fa-magic"></i> Format</button>
        <button class="icon-btn" onclick="exportCode()"><i class="fas fa-download"></i> Export</button>
        <button class="icon-btn" onclick="toggleSettings()"><i class="fas fa-cog"></i></button>
        <button class="icon-btn run-btn" onclick="runCode()"><b>RUN</b></button>
    </div>
</header>

<div class="main-container">
    <div class="editor-section" id="editor-wrapper">
        </div>
</div>

<div id="preview-overlay" class="preview-overlay" style="display:none;">
    <div class="preview-navbar">
        <div class="preview-controls">
            <button onclick="closePreview()" class="prev-btn"><i class="fas fa-arrow-left"></i> Back</button>
            <button onclick="refreshPreview()" class="prev-btn"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="device-toggles">
            <button onclick="setDevice('desktop')" id="btn-desk" class="active"><i class="fas fa-desktop"></i></button>
            <button onclick="setDevice('mobile')" id="btn-mob"><i class="fas fa-mobile-alt"></i></button>
        </div>
    </div>
    <div class="iframe-container" id="iframe-container">
        <iframe id="output"></iframe>
    </div>
</div>

<script src="Script.js"></script>
</body>
</html>
