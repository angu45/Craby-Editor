<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Craby C Compiler - Fast Online C Programming IDE</title>
    
    <meta name="title" content="Craby C Compiler - Fast Online C Programming IDE">
    <meta name="description" content="Free Online C Compiler - Write, compile and run C programs directly in your browser with Craby Editor.">
    <meta name="keywords" content="craby c compiler, online c compiler, run c code online, free c programming ide">
    <meta name="author" content="Anguworkshop">

    <link rel="icon" type="image/png" href="https://i.ibb.co/0RcjyBQF/1000176575-removebg-preview.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/0RcjyBQF/1000176575-removebg-preview.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

    <link rel="stylesheet" href="./css/c-compiler.css">

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { mono: ['JetBrains Mono', 'monospace'], sans: ['Outfit', 'sans-serif'] } } }
        }
    </script>
</head>

<body class="h-full font-sans" id="appBody">
    <div id="app" class="h-full flex flex-col overflow-hidden" style="background:#0d0d14;">
        
        <header id="headerBar" class="flex items-center justify-between px-4 py-2 border-b border-white/5 flex-shrink-0">
            <div class="flex items-center gap-3">
                <button id="sidebarToggle" class="p-1.5 rounded-lg hover:bg-white/5 lg:hidden"><i data-lucide="panel-left" class="w-5 h-5 text-gray-400"></i></button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm bg-gradient-to-br from-[#c8ff00] to-[#00d4ff] text-[#0d0d14]">C</div>
                    <span id="appTitleEl" class="font-semibold text-white text-sm hidden sm:inline">Craby C Compiler</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="btnRun" class="btn-glow flex items-center gap-1.5 px-3 py-1.5 rounded-lg font-semibold text-xs sm:text-sm bg-[#c8ff00] text-[#0d0d14]">
                    <i data-lucide="play" class="w-3.5 h-3.5"></i> <span id="runBtnText">Run Code</span>
                </button>
                <button id="btnFormat" class="p-2 text-gray-400 hover:text-white" title="Format"><i data-lucide="sparkles" class="w-4 h-4"></i></button>
                <button id="btnSettings" class="p-2 text-gray-400 hover:text-white"><i data-lucide="settings" class="w-4 h-4"></i></button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden relative">
            <aside id="sidebar" class="hidden lg:flex flex-col w-[220px] border-r border-white/5 panel-glass">
                <div class="p-3 border-b border-white/5 flex justify-between items-center">
                    <span class="text-[10px] font-bold text-gray-500 uppercase">Explorer</span>
                    <button id="btnNewFile" class="text-gray-400 hover:text-white"><i data-lucide="file-plus" class="w-4 h-4"></i></button>
                </div>
                <div id="fileList" class="flex-1 overflow-y-auto p-2"></div>
            </aside>

            <div class="flex-1 flex flex-col overflow-hidden">
                <div id="tabBar" class="flex border-b border-white/5 bg-black/20 overflow-x-auto"></div>
                <div class="flex-1 relative overflow-hidden" id="editorWrapper">
                    <div id="lineNumbers" class="absolute left-0 top-0 bottom-0 w-12 text-right pr-3 pt-0 font-mono text-xs text-gray-600 select-none"></div>
                    <div class="ml-12 h-full relative">
                        <div id="highlightOverlay" class="highlight-overlay"></div>
                        <textarea id="codeInput" class="code-input" spellcheck="false"></textarea>
                    </div>
                </div>

                <div id="resizeHandle" class="h-1 bg-white/5 cursor-row-resize hover:bg-[#c8ff00]/30 transition-colors"></div>

                <div id="outputPanel" class="h-[180px] bg-[#0a0a10] flex flex-col">
                    <div class="px-3 py-1 border-b border-white/5 flex justify-between items-center">
                        <span class="text-[10px] font-bold text-gray-500 uppercase">Console</span>
                        <span id="outputStatus" class="text-[10px]"></span>
                    </div>
                    <div id="outputContent" class="flex-1 p-3 font-mono text-xs text-[#50fa7b] overflow-y-auto"></div>
                </div>
            </div>
        </div>

        <div id="settingsOverlay" class="hidden fixed inset-0 bg-black/60 z-40 backdrop-blur-sm"></div>
        <aside id="settingsPanel" class="hidden fixed right-0 top-0 bottom-0 w-72 z-50 panel-glass p-4">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-white font-bold">Settings</h3>
                <button id="closeSettings" class="text-gray-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-4 text-xs text-gray-400">
                <div>
                    <label>Font Size</label>
                    <input type="range" id="settingFontSize" min="10" max="24" class="w-full accent-[#c8ff00]">
                </div>
                <div class="flex justify-between items-center">
                    <span>Line Numbers</span>
                    <div id="toggleLineNums" class="toggle-track on"><div class="toggle-knob"></div></div>
                </div>
            </div>
        </aside>
    </div>

    <script src="./js/c-compiler.js"></script>
</body>
</html>
